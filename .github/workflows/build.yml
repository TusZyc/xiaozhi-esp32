name: Build ATK-DNESP32S3-BOX Firmware

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: '是否强制清除缓存重新编译'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Fix git ownership
        run: git config --global --add safe.directory '*'

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Cache IDF components
        uses: actions/cache@v4
        if: ${{ !inputs.clean_build }}
        with:
          path: managed_components
          key: idf-components-esp32s3-${{ hashFiles('main/idf_component.yml') }}
          restore-keys: |
            idf-components-esp32s3-

      - name: Build firmware
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          python scripts/release.py atk-dnesp32s3-box --name atk-dnesp32s3-box

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-atk-dnesp32s3-box-firmware
          path: build/merged-binary.bin
          if-no-files-found: error
          retention-days: 30
