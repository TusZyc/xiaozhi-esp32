name: Build ATK-DNESP32S3-BOX Firmware

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: '是否强制清除缓存重新编译'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5

    steps:
      - name: Fix git ownership
        run: git config --global --add safe.directory '*'

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Cache IDF components
        uses: actions/cache@v4
        if: ${{ !inputs.clean_build }}
        with:
          path: |
            ~/.cache/pip
            managed_components
          key: idf-components-esp32s3-${{ hashFiles('main/idf_component.yml') }}
          restore-keys: |
            idf-components-esp32s3-

      - name: Configure board (ATK-DNESP32S3-BOX)
        run: |
          echo "" >> sdkconfig.defaults
          echo "# === Board: ATK-DNESP32S3-BOX ===" >> sdkconfig.defaults
          echo "CONFIG_BOARD_TYPE_ATK_DNESP32S3_BOX=y" >> sdkconfig.defaults
          echo "CONFIG_USE_WECHAT_MESSAGE_STYLE=y" >> sdkconfig.defaults

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Merge binary for one-click flashing
        run: |
          . $IDF_PATH/export.sh
          idf.py merge-bin
          mkdir -p output
          cp build/merged-binary.bin output/xiaozhi-atk-dnesp32s3-box.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-atk-dnesp32s3-box-firmware
          path: output/xiaozhi-atk-dnesp32s3-box.bin
          retention-days: 30
