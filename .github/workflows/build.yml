name: Build ESP32-S3 Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Install ESP-IDF
      run: |
        mkdir -p ~/esp
        cd ~/esp
        git clone --depth 1 --branch v5.4 https://github.com/espressif/esp-idf.git
        cd esp-idf
        ./install.sh esp32s3
    
    - name: Build firmware
      run: |
        source ~/esp/esp-idf/export.sh
        idf.py set-target esp32s3
        # 配置开发板类型
        echo "CONFIG_BOARD_TYPE_ATK_DNESP32S3_BOX=y" >> sdkconfig.defaults
        idf.py build
    
    - name: Create firmware binary
      run: |
        source ~/esp/esp-idf/export.sh
        mkdir -p output
        esptool.py --chip esp32s3 merge_bin -o output/xiaozhi_esp32s3_box.bin \
          --flash_mode dio --flash_size 16MB --flash_freq 80m \
          0x0 build/bootloader/bootloader.bin \
          0x8000 build/partition_table/partition-table.bin \
          0x10000 build/xiaozhi.bin
    
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: xiaozhi-firmware
        path: output/
        retention-days: 30